<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuzlocke - Team Overlay Manuel 1200x150</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 1200px;
            height: 150px; 
        }
        
        .team-container {
            width: 1200px;
            height: 150px; 
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            align-items: center;
            justify-items: center;
        }

        .pokemon-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; 
            width: 100%;
            height: 100%;
            position: relative;
            padding-bottom: 4px; /* Optimisé pour utiliser tout l'espace vertical */
        }

        /* Agrandissement du conteneur de sprite pour utiliser l'espace (130px de large) */
        .sprite-container {
            width: 130px;
            height: 115px;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            position: relative;
            margin-bottom: 2px;
        }

        /* Plateforme élargie à 120px pour mieux asseoir les grands sprites (reprise à l'identique de l'original) */
        .poke-platform {
            position: absolute;
            bottom: -12px; 
            width: 120px;
            height: 45px; 
            background-image: url('platform_crop.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 0;
        }

        /* Aura pulsante élargie derrière le Pokémon */
        .poke-glow {
            position: absolute;
            bottom: 10px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 1;
            animation: pulse-glow 3s infinite ease-in-out;
        }

        /* Sprite agrandi (max 95%) pour remplir la hauteur de 150px */
        .pokemon-sprite {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
            z-index: 2;
            image-rendering: auto;
            animation: floating 8s infinite ease-in-out;
            transform-origin: bottom center;
        }

        /* Conteneur d'infos légèrement plus haut et plus large */
        .info-container {
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 3;
            height: 30px;
            background: rgba(0,0,0,0.25);
            padding: 0 12px;
            border-radius: 20px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* Surnom agrandi pour une meilleure visibilité sur le stream */
        .nickname-text {
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.15rem;
            letter-spacing: 0.02em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            white-space: nowrap;
            max-width: 160px; /* Plus d'espace pour afficher les longs noms */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gender-icon {
            font-size: 1.2rem;
            font-weight: 900;
            text-shadow: 1.5px 1.5px 0px rgba(0,0,0,0.5);
        }
        .male { color: #60a5fa; }
        .female { color: #f472b6; }

        /* ANIMATIONS */
        @keyframes floating {
            0%, 100% { 
                transform: translateY(0) translateX(-1px) rotate(-1.5deg); 
            }
            50% { 
                transform: translateY(-3px) translateX(1px) rotate(1.5deg); 
            }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.85) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div id="team-wrapper" class="team-container">
        <div id="slot-0" class="pokemon-slot"></div>
        <div id="slot-1" class="pokemon-slot"></div>
        <div id="slot-2" class="pokemon-slot"></div>
        <div id="slot-3" class="pokemon-slot"></div>
        <div id="slot-4" class="pokemon-slot"></div>
        <div id="slot-5" class="pokemon-slot"></div>
    </div>

    <script>
        const socket = io();

        function updateSlot(index, pokemon) {
            const slot = document.getElementById(`slot-${index}`);
            
            if (!pokemon) {
                slot.innerHTML = "";
                slot.removeAttribute('data-id');
                return;
            }

            const pkmnId = `${pokemon.nickname}-${pokemon.enSpecies}-${pokemon.isShiny ? 'shiny' : 'normal'}`;
            if (slot.getAttribute('data-id') === pkmnId) return;

            slot.setAttribute('data-id', pkmnId);
            
            const genderHtml = pokemon.gender === 'M' ? '<span class="gender-icon male">♂</span>' : 
                               pokemon.gender === 'F' ? '<span class="gender-icon female">♀</span>' : '';

            slot.innerHTML = `
                <div class="sprite-container fade-in">
                    <div class="poke-platform"></div>
                    <div class="poke-glow" style="background: radial-gradient(circle, ${pokemon.isShiny ? 'rgba(250,204,21,0.45)' : 'rgba(255,255,255,0.3)'} 0%, rgba(255,255,255,0) 70%)"></div>
                    <img src="${pokemon.sprite}" 
                         alt="${pokemon.frSpecies}" 
                         class="pokemon-sprite" 
                         onerror="this.src='${pokemon.fallback}'; this.onerror=null;">
                </div>
                <div class="info-container fade-in">
                    <span class="nickname-text">${pokemon.nickname}</span>
                    ${genderHtml}
                </div>
            `;
        }

        socket.on('init', (data) => {
            data.state.team.forEach((p, i) => updateSlot(i, p));
        });

        socket.on('state_updated', (state) => {
            state.team.forEach((p, i) => updateSlot(i, p));
        });
    </script>
</body>
</html>
